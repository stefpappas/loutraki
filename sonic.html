<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sonic The Hedgehog — Game Hub</title>
  <style>
    :root { --accent:#4fc3f7; --bg:#07070e; --panel:#0d0d1c; --border:#1a1a30; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:#b0b0cc; font-family:'Courier New',Courier,monospace; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:24px 16px; gap:20px; }
    .hub-link { align-self:flex-start; color:#3a3a58; font-size:.75em; letter-spacing:2px; text-decoration:none; padding:6px 10px; border:1px solid #1a1a30; border-radius:4px; transition:color .15s,border-color .15s; }
    .hub-link:hover { color:var(--accent); border-color:var(--accent); }
    h1 { font-size:clamp(1.8em,5vw,2.8em); color:var(--accent); text-shadow:0 0 24px rgba(79,195,247,.45); letter-spacing:6px; }
    .sub { font-size:.75em; color:#3a3a58; letter-spacing:3px; margin-top:-14px; }
    #game-wrap {
      width:100%;
      max-width:800px;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:8px;
      overflow:hidden;
      position:relative;
    }
    #game { width:100%; aspect-ratio:4/3; display:block; }
    .controls-note {
      font-size:.72em;
      color:#444;
      text-align:center;
      letter-spacing:1px;
      line-height:1.9;
      padding:12px;
      border-top:1px solid var(--border);
    }
    .controls-note span { color:#666; }
    footer { font-size:.7em; color:#1e1e30; letter-spacing:2px; text-align:center; padding-top:8px; }
  </style>
</head>
<body>

<a class="hub-link" href="index.html">← GAME HUB</a>

<div>
  <h1>SONIC THE HEDGEHOG</h1>
  <p class="sub">SEGA MEGA DRIVE · 1991</p>
</div>

<div id="game-wrap">
  <div id="game"></div>
  <div class="controls-note">
    <span>D-PAD</span> Move &nbsp;|&nbsp; <span>A</span> Jump &nbsp;|&nbsp; <span>START</span> Pause &nbsp;|&nbsp;
    Use the on-screen controller or keyboard arrow keys + Z/X/C
  </div>
</div>

<footer>EMULATED VIA EMULATORJS · NO SERVER REQUIRED</footer>

<script>
  EJS_player       = '#game';
  EJS_gameName     = 'Sonic The Hedgehog';
  EJS_gameUrl      = 'roms/sonic.md';
  EJS_core         = 'segaMD';
  EJS_pathtodata   = 'https://cdn.jsdelivr.net/npm/emulatorjs@latest/data/';
  EJS_startOnLoaded = true;
  EJS_fullscreenOnLoaded = false;
  EJS_color        = '#4fc3f7';
</script>
<script src="https://cdn.jsdelivr.net/npm/emulatorjs@latest/data/loader.js"></script>

</body>
</html>
